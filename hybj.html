<!DOCTYPE html>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: "#d4af37",
            "gold-light": "#f4e4a6",
            "gold-dark": "#b8960c"
          },
          keyframes: {
            shimmer: {
              "0%, 100%": { opacity: "1", transform: "scale(1)" },
              "50%": { opacity: "0.8", transform: "scale(1.05)" }
            },
            sparkle: {
              "0%": { transform: "translateY(0)" },
              "100%": { transform: "translateY(-100px)" }
            },
            float: {
              "0%, 100%": { transform: "translateY(0)" },
              "50%": { transform: "translateY(-10px)" }
            },
            goldshine: {
              "0%": { backgroundPosition: "0% center" },
              "100%": { backgroundPosition: "200% center" }
            },
            fadeindown: {
              "0%": { opacity: "0", transform: "translateY(-20px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            },
            fadeinup: {
              "0%": { opacity: "0", transform: "translateY(20px)" },
              "100%": { opacity: "1", transform: "translateY(0)" }
            }
          },
          animation: {
            shimmer: "shimmer 10s ease-in-out infinite",
            sparkle: "sparkle 8s linear infinite",
            float: "float 4s ease-in-out infinite",
            goldshine: "goldshine 4s linear infinite",
            fadeindown: "fadeindown 0.6s ease",
            fadeinup: "fadeinup 0.6s ease"
          }
        }
      }
    };
  </script>
  <style>
    .tag-btn { cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; transition: all .15s; }
    .tag-btn:hover { border-color: rgba(212,175,55,.5); color: #f4e4a6; }
    .tag-btn.active { background: rgba(212,175,55,.25); border-color: #d4af37; color: #f4e4a6; box-shadow: 0 0 8px rgba(212,175,55,.25); font-weight: 500; }
    .tag-btn.tag-toggle { border-color: rgba(212,175,55,.45); color: #d4af37; background: transparent; }
    .tag-btn.tag-toggle:hover { border-color: rgba(212,175,55,.7); color: #f4e4a6; background: rgba(212,175,55,.1); }
    .sel-wrap { position: relative; }
    .sel-list { position: absolute; left: 0; right: 0; top: calc(100% + 4px); max-height: 260px; overflow-y: auto; background: #1a1a1a; border: 1px solid rgba(212,175,55,.3); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.5); z-index: 50; display: none; }
    .sel-list.open { display: block; }
    .sel-item { padding: 9px 16px; font-size: 14px; color: rgba(244,228,166,.8); cursor: pointer; transition: background .1s; }
    .sel-item:hover { background: rgba(212,175,55,.1); }
    .sel-item.on { color: #d4af37; font-weight: 500; }
    .sel-item.hd { color: rgba(212,175,55,.5); font-size: 12px; font-weight: 600; background: rgba(212,175,55,.05); cursor: default; padding: 6px 16px; }
    .sel-item.hd:hover { background: rgba(212,175,55,.05); }
    .sel-item.hide { display: none; }
    .sel-list::-webkit-scrollbar { width: 5px; }
    .sel-list::-webkit-scrollbar-track { background: transparent; }
    .sel-list::-webkit-scrollbar-thumb { background: rgba(212,175,55,.3); border-radius: 3px; }
    .form-row { display: grid; grid-template-columns: 70px 1fr; gap: 0 16px; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(212,175,55,0.1); }
    .form-row:last-of-type { border-bottom: none; }
    .form-row.row-top { align-items: start; }
    .form-row.row-top > :nth-child(2) { overflow: hidden; }
    .row-label { color: #d4af37; font-size: 14px; font-weight: 600; white-space: nowrap; }
    @media (max-width: 640px) {
      .form-row { grid-template-columns: 1fr; gap: 6px 0; }
      .row-label { padding-top: 0; }
    }
  </style>
</head>

  <script>
    $(document).ready(function(){
      $(".tj").hide();
      $("#TjData").click(function(){
        $(".tj").toggle();
      });
      $("#toggleMatCustom").click(function(){
        $("#selWrap").toggle();
      });
      $("#toggleSizeCustom").click(function(){
        $("#customSizeRow").toggle();
      });
      $("#toggleQtyCustom").click(function(){
        $("#customQtyRow").toggle();
      });
    });
    $(document).ready(function(){
      $("#Kssize").hide();
      $("#KsData").click(function(){
        $("#Kssize").toggle();
      });
    });
    $(document).ready(function(){
      $("#Jbsize").hide();
      $("#JbData").click(function(){
        $("#Jbsize").toggle();
      });
    });
  </script>
  <script>
  (function(){
    var forma = document.getElementById('forma');
    var matSel = document.getElementById('Material');
    var selInput = document.getElementById('selInput');
    var selList = document.getElementById('selList');
    var selWrap = document.getElementById('selWrap');
    function fire(){ forma.dispatchEvent(new Event('input',{bubbles:true})); }

    // ── 常用尺寸 ──
    document.querySelectorAll('.quick-size').forEach(function(btn){
      btn.addEventListener('click',function(){
        document.querySelectorAll('.quick-size').forEach(function(b){b.classList.remove('active')});
        btn.classList.add('active');
        document.getElementById('mwidth').value = btn.dataset.w;
        document.getElementById('mheight').value = btn.dataset.h;
        fire();
      });
    });

    // ── 常用数量 ──
    document.querySelectorAll('.quick-qty').forEach(function(btn){
      btn.addEventListener('click',function(){
        document.querySelectorAll('.quick-qty').forEach(function(b){b.classList.remove('active')});
        btn.classList.add('active');
        document.getElementById('msize').value = btn.dataset.qty;
        fire();
      });
    });

    // ── 常用材料 ──
    document.querySelectorAll('.quick-mat').forEach(function(btn){
      btn.addEventListener('click',function(){
        document.querySelectorAll('.quick-mat').forEach(function(b){b.classList.remove('active')});
        btn.classList.add('active');
        var txt = btn.dataset.text;
        for(var i=0;i<matSel.options.length;i++){
          if(matSel.options[i].text.indexOf(txt)!==-1 && matSel.options[i].value!=='9999'){
            matSel.selectedIndex = i;
            selInput.value = matSel.options[i].text;
            updateDropdownActive(i);
            break;
          }
        }
        fire();
      });
    });

    // ── 搜索下拉框 ──
    function buildList(){
      while(selList.firstChild) selList.removeChild(selList.firstChild);
      for(var i=0;i<matSel.options.length;i++){
        var opt=matSel.options[i], div=document.createElement('div');
        if(opt.value==='9999'){
          div.className='sel-item hd';
          div.textContent=opt.text;
        }else{
          div.className='sel-item';
          div.textContent=opt.text;
          div.dataset.idx=i;
          if(i===matSel.selectedIndex) div.classList.add('on');
          (function(idx,text){
            div.addEventListener('click',function(){
              matSel.selectedIndex=idx;
              selInput.value=text;
              selList.classList.remove('open');
              updateDropdownActive(idx);
              document.querySelectorAll('.quick-mat').forEach(function(b){b.classList.remove('active')});
              fire();
            });
          })(i,opt.text);
        }
        selList.appendChild(div);
      }
    }

    function updateDropdownActive(idx){
      selList.querySelectorAll('.sel-item:not(.hd)').forEach(function(el){
        el.classList.toggle('on', el.dataset.idx==idx);
      });
    }

    buildList();

    selInput.addEventListener('input',function(){
      var q=this.value.toLowerCase();
      selList.classList.add('open');
      selList.querySelectorAll('.sel-item').forEach(function(el){
        if(el.classList.contains('hd')){
          el.classList.toggle('hide',q.length>0);
        }else{
          el.classList.toggle('hide',q.length>0 && el.textContent.toLowerCase().indexOf(q)===-1);
        }
      });
    });

    selInput.addEventListener('focus',function(){ selList.classList.add('open'); });
    document.addEventListener('click',function(e){
      if(!selWrap.contains(e.target)) selList.classList.remove('open');
    });

    // ── 手动输入时同步高亮 ──
    document.getElementById('mwidth').addEventListener('input',function(){ clearSizeActive(); });
    document.getElementById('mheight').addEventListener('input',function(){ clearSizeActive(); });
    document.getElementById('msize').addEventListener('input',function(){
      var v=this.value;
      document.querySelectorAll('.quick-qty').forEach(function(b){
        b.classList.toggle('active',b.dataset.qty===v);
      });
    });
    function clearSizeActive(){
      var w=document.getElementById('mwidth').value, h=document.getElementById('mheight').value;
      document.querySelectorAll('.quick-size').forEach(function(b){
        b.classList.toggle('active',b.dataset.w===w && b.dataset.h===h);
      });
    }
  })();
  </script>
</body>
